<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
    <title>MirBeton ERP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { background: #0b0d0a; color: #e2ead6; font-family: 'JetBrains Mono', monospace; }
        .industrial-card { background: #121511; border: 1px solid #242a20; border-radius: 20px; border-l-4 border-l-lime-500; }
        .btn-prime { background: #9dc45a; color: #000; font-weight: 800; border-radius: 12px; transition: 0.2s; }
        .btn-prime:active { transform: scale(0.95); }
        .status-badge { font-size: 9px; padding: 2px 8px; border-radius: 4px; background: #242a20; color: #9dc45a; text-transform: uppercase; }
    </style>
</head>
<body class="p-4">
    <div id="app">
        <div id="view-prod_ops" class="hidden space-y-4">
            <h2 class="text-xl font-black text-lime-500">⚙️ ISHLAB CHIQARISH</h2>
            <div id="prod-orders" class="space-y-3">
                <div class="industrial-card p-4">
                    <div class="flex justify-between mb-2">
                        <span class="font-bold">#MB-2603-01</span>
                        <span class="status-badge">Kutilmoqda</span>
                    </div>
                    <div class="text-xs text-slate-500 mb-3">M300 · 10 m³ · Urgut mfy</div>
                    <select id="driver-select-1" class="w-full bg-slate-900 p-2 rounded mb-2 text-sm border border-slate-700">
                        <option>Haydovchini tanlang...</option>
                        <option value="d1">Alijon (Mixer 01)</option>
                        <option value="d2">Valijon (Mixer 05)</option>
                    </select>
                    <button onclick="pourBeton(1)" class="w-full btn-prime py-3">🏗 QUYISHNI BOSHLASH</button>
                </div>
            </div>
        </div>

        <div id="view-driver" class="hidden space-y-4">
            <div class="industrial-card p-6">
                <div class="text-[10px] text-lime-500 font-bold mb-1">FAOL BUYURTMA</div>
                <div class="text-2xl font-black italic">#MB-2603-01</div>
                <div id="client-info" class="mt-4 text-xs space-y-1 text-slate-400">
                    <p>👤 Mijoz: Azizbek R.</p>
                    <p>📞 Tel: +998 90 123 45 67</p>
                    <p>📍 Manzil: Urgut, Navoiy ko'chasi</p>
                </div>
                <div class="flex gap-2 mt-4">
                    <button onclick="openMap()" class="flex-1 bg-blue-600 text-[10px] p-3 rounded font-bold">🗺 YANDEX MAP</button>
                    <button onclick="window.open('tel:+998901234567')" class="flex-1 bg-slate-800 text-[10px] p-3 rounded font-bold">📞 QO'NG'IROQ</button>
                </div>
            </div>
            
            <div class="grid grid-cols-1 gap-3">
                <button onclick="driverAction('en_route')" class="btn-prime py-5 text-lg italic bg-lime-500">🚚 JO'NADIM</button>
                <button onclick="driverAction('arrived')" class="btn-prime py-5 text-lg italic bg-orange-500">📍 MANZILDA</button>
                <button onclick="driverAction('completed')" class="btn-prime py-5 text-lg italic bg-white text-black">🏁 TUGATDIM</button>
            </div>
        </div>
    </div>

    <script>
        const tg = window.Telegram.WebApp;
        const params = new URLSearchParams(window.location.search);
        const role = params.get('role');
        const userId = params.get('user_id');

        tg.expand();
        document.getElementById('view-' + role)?.classList.remove('hidden');

        async function pourBeton(tripId) {
            const driverId = document.getElementById('driver-select-' + tripId).value;
            await fetch('/api/prod/pour', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({ trip_id: tripId, driver_id: driverId })
            });
            tg.showConfirm("Xabar haydovchiga yuborildi!");
        }

        async function driverAction(event) {
            navigator.geolocation.getCurrentPosition(async (pos) => {
                await fetch('/api/driver/event', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({
                        trip_id: 1, 
                        event: event,
                        lat: pos.coords.latitude,
                        lng: pos.coords.longitude
                    })
                });
                tg.HapticFeedback.notificationOccurred('success');
                if(event === 'completed') tg.close();
            });
        }

        function openMap() {
            const lat = 39.40, lng = 67.24; // Test coords
            window.open(`yandexmaps://maps.yandex.ru/?pt=${lng},${lat}&z=12&l=map`);
        }
    </script>
</body>
</html>
